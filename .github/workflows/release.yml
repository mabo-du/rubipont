name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            suffix: ""
          - os: macos-latest
            target: x86_64-apple-darwin
            suffix: ""
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            suffix: ".exe"

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6

      - name: Build
        run: cargo build --release -p rubipont-cli

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: rubipont-${{ matrix.target }}
          path: target/release/rp${{ matrix.suffix }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/

      - name: Package binaries
        run: |
          cd dist
          for dir in rubipont-*/; do
            [ -d "$dir" ] || continue
            platform="${dir%/}"
            tar czf "${platform}.tar.gz" -C "$platform" .
          done

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          name: rubipont ${{ github.ref_name }}
          generate_release_notes: true
          files: dist/*.tar.gz
